<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-analysis-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-analysis-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBE Marking Coach · CubeDataAnalysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040d18;
  --navy-mid: #0a1628;
  --surface: #0e1e34;
  --surface2: #141e30;
  --border: rgba(255,255,255,0.08);
  --border-gold: rgba(201,168,76,0.3);
  --text: #e8eaf0;
  --text-dim: #7a9ab8;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --green: #43d9ad;
  --red: #ff6b6b;
  --ees:   #4fc3f7;
  --engs:  #e8a030;
  --buss:  #a78bfa;
  --hltm:  #43d9ad;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* HEADER */
header {
  padding: 1.5rem 2.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(4,13,24,0.96);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50;
}
/* eyebrow matches "HOW IT WORKS" — Helvetica Neue 700 uppercase */
.eyebrow {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.3rem;
}
/* h1 matches hero "Get instant feedback" — Helvetica Neue 800 */
h1 {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 1.75rem; font-weight: 800; line-height: 1.1; color: var(--text);
}
h1 span { color: var(--gold); }
.header-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem; }
.btn-refresh {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #040d18; border: none; padding: 0.55rem 1.25rem;
  border-radius: 8px; cursor: pointer; font-weight: 700;
  box-shadow: 0 4px 16px rgba(201,168,76,0.25);
  transition: opacity 0.2s;
}
.btn-refresh:hover { opacity: 0.85; }
.status-line { font-size: 0.7rem; color: var(--text-dim); display:flex; align-items:center; gap:0.4rem; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); display:inline-block; flex-shrink:0; }
.dot.live { background:var(--green); box-shadow:0 0 6px var(--green); }
.dot.err  { background:var(--red); }

/* SUBJECT SELECTOR */
#subject-selector {
  padding: 2rem 2.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--navy-mid);
}
.selector-label {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.25rem;
}
.subject-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}
.subject-box {
  background: linear-gradient(135deg, var(--surface), var(--navy-mid));
  border: 1.5px solid rgba(240,192,48,0.7);
  border-radius: 16px; padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: border-color 0.25s, transform 0.2s, background 0.25s;
}
.subject-box.active .subj-name { color: #ffffff; }
.subject-box.active .kla-tag::after {
  content: ' · SELECTED';
  font-size: 0.55rem;
  opacity: 0.85;
  letter-spacing: 0.12em;
}
.subject-box { transition: border-color 0.25s, transform 0.2s, background 0.25s, box-shadow 0.25s; }
.subject-box:hover { border-color: #f0c030; transform: translateY(-2px); }
.subject-box.active[data-kla="EES"]   {
  border-color: var(--ees); border-width: 2.5px;
  background: linear-gradient(135deg, rgba(79,195,247,0.22), rgba(79,195,247,0.10));
  box-shadow: 0 0 0 3px rgba(79,195,247,0.18), 0 6px 24px rgba(79,195,247,0.15);
  transform: translateY(-3px) scale(1.02);
}
.subject-box.active[data-kla="EngS"]  {
  border-color: var(--engs); border-width: 2.5px;
  background: linear-gradient(135deg, rgba(232,160,48,0.22), rgba(232,160,48,0.10));
  box-shadow: 0 0 0 3px rgba(232,160,48,0.18), 0 6px 24px rgba(232,160,48,0.15);
  transform: translateY(-3px) scale(1.02);
}
.subject-box.active[data-kla="BusS"]  {
  border-color: var(--buss); border-width: 2.5px;
  background: linear-gradient(135deg, rgba(167,139,250,0.22), rgba(167,139,250,0.10));
  box-shadow: 0 0 0 3px rgba(167,139,250,0.18), 0 6px 24px rgba(167,139,250,0.15);
  transform: translateY(-3px) scale(1.02);
}
.subject-box.active[data-kla="HlthM"] {
  border-color: var(--hltm); border-width: 2.5px;
  background: linear-gradient(135deg, rgba(67,217,173,0.22), rgba(67,217,173,0.10));
  box-shadow: 0 0 0 3px rgba(67,217,173,0.18), 0 6px 24px rgba(67,217,173,0.15);
  transform: translateY(-3px) scale(1.02);
}
.kla-tag {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 0.35rem;
}
.subject-box[data-kla="EES"]   .kla-tag { color: var(--ees); }
.subject-box[data-kla="EngS"]  .kla-tag { color: var(--engs); }
.subject-box[data-kla="BusS"]  .kla-tag { color: var(--buss); }
.subject-box[data-kla="HlthM"] .kla-tag { color: var(--hltm); }
.subj-name {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 0.5rem;
}
.subj-count { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:#f0c030; margin-top:0.25rem; font-weight:700; }

/* MAIN */
main { padding: 1.75rem 2.5rem; }

/* LOADING */
#loading-screen { display:none; text-align:center; padding:5rem 2rem; }
.spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ERROR */
#error-screen { display:none; text-align:center; padding:4rem 2rem; }
.error-box { max-width:520px; margin:0 auto; background:rgba(255,107,107,0.07); border:1px solid rgba(255,107,107,0.25); border-radius:12px; padding:2rem; }
.error-title { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:800; font-size:1rem; color:var(--red); margin-bottom:0.75rem; }
.error-msg { font-size:0.82rem; color:var(--text-dim); line-height:1.7; }

/* DASHBOARD */
#dashboard { display:none; }
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:1rem; margin-bottom:1.5rem; }
.stat-card {
  background: linear-gradient(135deg, var(--surface), var(--navy-mid));
  border: 1px solid var(--border-gold); border-radius: 10px;
  padding: 1rem 1.2rem; position: relative; overflow: hidden;
}
.stat-card::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; }
.stat-card.c-ees::before   { background:var(--ees); }
.stat-card.c-engs::before  { background:var(--engs); }
.stat-card.c-buss::before  { background:var(--buss); }
.stat-card.c-hltm::before  { background:var(--hltm); }
.stat-card.c-neutral::before { background:var(--gold); }
.stat-label { font-family:'IBM Plex Mono',monospace; font-size:0.56rem; letter-spacing:0.15em; text-transform:uppercase; color:#e8eaf0; margin-bottom:0.4rem; }
.stat-value { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:2rem; font-weight:800; line-height:1; }
.stat-value.good { color:var(--green); }
.stat-value.warn { color:var(--gold); }
.stat-value.low  { color:var(--red); }
.stat-sub { font-size:0.7rem; color:#c8d8e8; margin-top:0.2rem; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.25rem; }
.mb { margin-bottom:1.25rem; }

.panel {
  background: linear-gradient(135deg, var(--surface), var(--navy-mid));
  border: 1px solid var(--border-gold); border-radius: 12px; padding: 1.25rem;
}
.panel-title {
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:0.87rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
  color:#f0c030; margin-bottom:1rem; padding-bottom:0.55rem;
  border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;
}
.panel-title span { color:#ffffff; font-weight:600; }

.bar-chart { display:flex; flex-direction:column; gap:0.55rem; }
.bar-row { display:flex; align-items:center; gap:0.7rem; }
.bar-label { font-size:0.82rem; width:160px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#e8eaf0; }
.bar-track { flex:1; height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.9s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-family:'IBM Plex Mono',monospace; font-size:0.68rem; width:38px; text-align:right; color:#e8eaf0; }

.mission-freq { display:flex; flex-direction:column; gap:0.5rem; }
.mission-row { display:flex; align-items:center; gap:0.75rem; }
.mission-name { font-size:0.78rem; width:200px; flex-shrink:0; color:#e8eaf0; }
.mission-bar-track { flex:1; height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.mission-bar-fill { height:100%; border-radius:3px; }
.mission-count { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:#ffffff; width:24px; text-align:right; font-weight:700; }

.example-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:0.75rem; }
.example-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-left:3px solid var(--border); border-radius:10px; padding:0.9rem 1rem; }
.example-card.fix-causal { border-left-color:#4fc3f7; }
.example-card.fix-noun   { border-left-color:#a78bfa; }
.example-card.fix-flow   { border-left-color:#43d9ad; }
.example-card.fix-mod    { border-left-color:#e8a030; }
.example-card.fix-other  { border-left-color:#6b7599; }
.ex-label { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:#e8eaf0; margin-bottom:0.35rem; font-weight:600; }
.ex-before { font-size:0.77rem; color:var(--red); margin-bottom:0.3rem; }
.ex-before::before { content:'✗ '; }
.ex-after  { font-size:0.77rem; color:var(--green); }
.ex-after::before  { content:'✓ '; }
.ex-kw { font-size:0.72rem; color:#c8d8e8; margin-top:0.3rem; font-style:italic; }

.student-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
.student-table th { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:#e8eaf0; text-align:left; padding:0.45rem 0.7rem; border-bottom:1px solid var(--border); font-weight:700; }
.student-table td { padding:0.5rem 0.7rem; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
.student-table tr:last-child td { border-bottom:none; }
.student-table tr:hover td { background:rgba(201,168,76,0.04); }
.pill { display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:0.58rem; letter-spacing:0.06em; padding:0.15rem 0.5rem; border-radius:20px; }
.pill.high { background:rgba(67,217,173,0.15); color:var(--green);  border:1px solid rgba(67,217,173,0.3); }
.pill.mid  { background:rgba(201,168,76,0.15);  color:var(--gold);   border:1px solid rgba(201,168,76,0.3); }
.pill.low  { background:rgba(255,107,107,0.15); color:var(--red);    border:1px solid rgba(255,107,107,0.3); }
.no-data { text-align:center; padding:2rem; color:var(--text-dim); font-size:0.82rem; font-style:italic; }

@media(max-width:768px){
  header,main{ padding:1.25rem; }
  #subject-selector{ padding:1.25rem; }
  .stats-row{ grid-template-columns:repeat(2,1fr); }
  .grid-2{ grid-template-columns:1fr; }
  .subject-grid{ grid-template-columns:1fr 1fr; }
}
@media(max-width:480px){
  .subject-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow">CUBE Marking Coach · CubeDataAnalysis</div>
    <h1>Teaching <span>Effectiveness</span> Tracker</h1>
  </div>
  <div class="header-right">
    <button class="btn-refresh" onclick="loadSheets()">↻ Refresh Data</button>
    <div class="status-line">
      <span class="dot" id="sdot"></span>
      <span id="stxt">Connecting…</span>
    </div>
  </div>
</header>

<div id="subject-selector">
  <div class="selector-label">Select Your Subject</div>
  <div class="subject-grid">
    <div class="subject-box" data-kla="EES" onclick="switchKLA('EES')">
      <div class="kla-tag">Science</div>
      <div class="subj-name">🌏 Earth &amp; Enviro Sci</div>
      <div class="subj-count" id="cnt-EES">Loading…</div>
    </div>
    <div class="subject-box" data-kla="BusS" onclick="switchKLA('BusS')">
      <div class="kla-tag">HSIE</div>
      <div class="subj-name">📊 Business Studies</div>
      <div class="subj-count" id="cnt-BusS">Loading…</div>
    </div>
    <div class="subject-box" data-kla="HlthM" onclick="switchKLA('HlthM')">
      <div class="kla-tag">PDHPE</div>
      <div class="subj-name">🏃 Health &amp; Movement</div>
      <div class="subj-count" id="cnt-HlthM">Loading…</div>
    </div>
    <div class="subject-box" data-kla="EngS" onclick="switchKLA('EngS')">
      <div class="kla-tag">TAS</div>
      <div class="subj-name">⚙️ Engineering Studies</div>
      <div class="subj-count" id="cnt-EngS">Loading…</div>
    </div>
  </div>
</div>

<main>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div style="color:var(--text-dim);font-size:0.85rem">Loading CUBE Marking Coach data…</div>
  </div>
  <div id="error-screen">
    <div class="error-box">
      <div class="error-title">⚠ Could not load data</div>
      <div class="error-msg" id="errmsg"></div>
    </div>
  </div>
  <div id="dashboard">
    <div class="stats-row" id="stats-row"></div>
    <div class="grid-2 mb" id="row1"></div>
    <div class="mb"        id="row2"></div>
    <div class="mb"        id="row3"></div>
    <div                   id="row4"></div>
  </div>
</main>

<script>
const SHEET_ID    = '1bUXcDRYv7B-4CAEaGmm4kxnOSIIDmLdMXVxj-nH2nJI';
const SHEET_NAMES = ['EES','EngS','BusS','HlthM'];
const KLA = {
  EES:   { label:'Earth & Environmental Science', color:'#4fc3f7', cls:'c-ees'  },
  EngS:  { label:'Engineering Studies',            color:'#e8a030', cls:'c-engs' },
  BusS:  { label:'Business Studies',               color:'#a78bfa', cls:'c-buss' },
  HlthM: { label:'Health & Movement',              color:'#43d9ad', cls:'c-hltm' },
};
const MCOL = {
  'Complex Noun Groups':'#a78bfa','complexNounGroups':'#a78bfa','complexnoungroups':'#a78bfa',
  'C — Complex Noun Groups':'#a78bfa',
  'Logical Flow & Structure':'#43d9ad','logicalFlow':'#43d9ad','logicalflow':'#43d9ad','Structure':'#43d9ad',
  'L — Logical Flow & Structure':'#43d9ad',
  'Modality':'#e8a030','modality':'#e8a030',
  'M — Modality':'#e8a030',
  'Causal Connectives':'#4fc3f7','causalConnectives':'#4fc3f7','causalconnectives':'#4fc3f7',
  'B — Because/But/So (Causal Connectives)':'#4fc3f7',
  'Legibility of handwritten response':'#6b7599','Handwriting Clarity':'#6b7599',
  'Technical Vocabulary':'#6b7599','Technical Communication':'#6b7599',
  'Technical Accuracy':'#6b7599','Technical Detail':'#6b7599','Technical Precision':'#6b7599',
};

let klaData = {}, activeKLA = null;

// ── LOAD ─────────────────────────────────────────────────
async function loadSheets() {
  showScreen('loading'); setDot('','Connecting…');
  klaData = {};
  try {
    await Promise.all(SHEET_NAMES.map(loadTab));
    SHEET_NAMES.forEach(k => {
      const n = (klaData[k]||[]).length;
      const el = document.getElementById('cnt-'+k);
      if(el) el.textContent = n ? n+' submissions' : 'No data yet';
    });
    setDot('live','Live · '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}));
    showScreen('dashboard');
    const first = SHEET_NAMES.find(k=>(klaData[k]||[]).length>0)||'EES';
    switchKLA(activeKLA || first);
  } catch(e) {
    setDot('err', e.message);
    document.getElementById('errmsg').textContent = e.message +
      ' — Make sure the Google Sheet is set to "Anyone with the link → Viewer" and try refreshing.';
    showScreen('error');
  }
}

async function loadTab(name) {
  const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const proxy  = `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`;
  let text = null;
  // Try proxy first (needed on GitHub Pages due to CORS)
  try { const r = await fetch(proxy,{cache:'no-store'}); if(r.ok) text=await r.text(); } catch(_){}
  // Fallback direct (works locally)
  if(!text || text.trim().startsWith('<!')) {
    try { const r = await fetch(csvUrl,{cache:'no-store'}); if(r.ok) text=await r.text(); } catch(_){}
  }
  if(!text || text.trim().startsWith('<!')) { klaData[name]=[]; return; }
  const rows = parseCSV(text);
  if(rows.length>0) console.log(`[CUBE ${name}] columns:`, Object.keys(rows[0]), 'sample:', rows[0]);

  // Recalculate percentages from raw scores — avoids proxy column name/format issues
  rows.forEach(r => {
    const awd = Number(r['Awd Mark']), qm = Number(r['Q Marks']);
    if(!isNaN(awd) && !isNaN(qm) && qm > 0) r['Mark %'] = awd / qm;
    const cxp = Number(r['CUBE XP']), cmax = Number(r['CUBE Max']);
    if(!isNaN(cxp) && !isNaN(cmax) && cmax > 0) r['CUBE %'] = cxp / cmax;
    const wxp = Number(r['Write XP']), wmax = Number(r['Write Max']);
    if(!isNaN(wxp) && !isNaN(wmax) && wmax > 0) r['Write %'] = wxp / wmax;
  });

  klaData[name] = rows.filter(r=>r.Student && r.Student!=='Test Student' && r.Student.trim()!=='');
}

// ── CSV ───────────────────────────────────────────────────
// Column aliases — maps every known variant to the canonical key
const COL_ALIAS = {
  'mark%':'Mark %','mark %':'Mark %',
  'cube%':'CUBE %','cube %':'CUBE %',
  'write%':'Write %','write %':'Write %',
  'cubemax':'CUBE Max','cube max':'CUBE Max',
  'writemax':'Write Max','write max':'Write Max',
  'cubeexp':'CUBE XP','cube xp':'CUBE XP',
  'writeexp':'Write XP','write xp':'Write XP',
  'annoexp':'Anno XP','anno xp':'Anno XP',
  'annoideas':'Anno Ideas','anno ideas':'Anno Ideas',
  'annoused':'Anno Used','anno used':'Anno Used',
  'awdmark':'Awd Mark','awd mark':'Awd Mark',
  'qmarks':'Q Marks','q marks':'Q Marks',
  'indband':'Ind Band','ind band':'Ind Band',
  'w-con':'W-Con','wcon':'W-Con',
  'w-con max':'W-Con Max','wconmax':'W-Con Max',
  'w-noun':'W-Noun','wnoun':'W-Noun',
  'w-noun max':'W-Noun Max','wnounmax':'W-Noun Max',
  'w-mod':'W-Mod','wmod':'W-Mod',
  'w-mod max':'W-Mod Max','wmodmax':'W-Mod Max',
  'w-flow':'W-Flow','wflow':'W-Flow',
  'w-flow max':'W-Flow Max','wflowmax':'W-Flow Max',
  'missioncategory':'Mission Category','mission category':'Mission Category',
  'missionfix':'Mission Fix','mission fix':'Mission Fix',
  'studentphrase':'Student Phrase','student phrase':'Student Phrase',
  'improvedversion':'Improved Version','improved version':'Improved Version',
  'syllabuskw':'Syllabus Kw','syllabus kw':'Syllabus Kw',
  'syllabuskeywords':'Syllabus Kw',
  'totalxp':'Total XP','total xp':'Total XP',
  'wordcount':'Word Count','word count':'Word Count',
  'illegible?':'Illegible ?','illegible ?':'Illegible ?',
  'qno':'Q No','q no':'Q No',
};

function cleanHeader(h) {
  // Strip quotes, trim, normalise internal spaces
  const s = h.replace(/^["'\s]+|["'\s]+$/g,'').replace(/\s+/g,' ');
  return COL_ALIAS[s.toLowerCase()] || s;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers = splitRow(lines[0]).map(cleanHeader);
  return lines.slice(1).map(line=>{
    const vals=splitRow(line), obj={};
    headers.forEach((h,i)=>{ obj[h]=coerce(vals[i]); });
    return obj;
  });
}

function splitRow(row) {
  const out=[]; let inQ=false,cur='';
  for(let i=0;i<row.length;i++){
    const c=row[i];
    if(c==='"'&&!inQ){inQ=true;}
    else if(c==='"'&&inQ&&row[i+1]==='"'){cur+='"';i++;}
    else if(c==='"'&&inQ){inQ=false;}
    else if(c===','&&!inQ){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur); return out;
}

function coerce(v) {
  if(v==null) return null;
  const s=String(v).replace(/^["'\s]+|["'\s]+$/g,'').trim();
  if(!s||s==='#N/A'||s==='#VALUE!'||s==='#REF!') return null;
  const n=Number(s); return isNaN(n)?s:n;
}

// ── UI ────────────────────────────────────────────────────
function showScreen(w) {
  document.getElementById('loading-screen').style.display = w==='loading' ?'block':'none';
  document.getElementById('error-screen').style.display   = w==='error'   ?'block':'none';
  document.getElementById('dashboard').style.display      = w==='dashboard'?'block':'none';
}
function setDot(cls,msg) {
  document.getElementById('sdot').className='dot'+(cls?' '+cls:'');
  document.getElementById('stxt').textContent=msg;
}
function switchKLA(kla) {
  activeKLA=kla;
  document.querySelectorAll('.subject-box').forEach(b=>b.classList.toggle('active',b.dataset.kla===kla));
  renderKLA(kla);
}

// ── RENDER ────────────────────────────────────────────────
function renderKLA(kla) {
  const rows=klaData[kla]||[], cfg=KLA[kla];
  if(!rows.length){
    document.getElementById('stats-row').innerHTML=
      `<div class="no-data" style="grid-column:1/-1">No data yet for ${cfg.label}. Data will appear as students use CUBE Marking Coach.</div>`;
    ['row1','row2','row3','row4'].forEach(id=>{document.getElementById(id).innerHTML='';});
    return;
  }
  renderStats(rows,cfg); renderRow1(rows,cfg); renderRow2(rows,cfg); renderRow3(rows,cfg); renderRow4(rows,cfg);
}

function renderStats(rows,cfg) {
  const vm=rows.filter(r=>r['Mark %']!=null);
  const aM=vm.length?avg(vm.map(r=>r['Mark %'])):null;
  const aC=avg(rows.filter(r=>r['CUBE %']!=null).map(r=>r['CUBE %']));
  const aW=avg(rows.filter(r=>r['Write %']!=null).map(r=>r['Write %']));
  const stu=new Set(rows.map(r=>r.Student)).size;
  const ses=new Set(rows.map(r=>r.Session).filter(Boolean)).size;
  const mc=aM==null?'':aM>=0.8?'good':aM>=0.6?'warn':'low';
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card ${cfg.cls}"><div class="stat-label">Submissions</div><div class="stat-value">${rows.length}</div><div class="stat-sub">${ses} sessions</div></div>
    <div class="stat-card ${cfg.cls}"><div class="stat-label">Students</div><div class="stat-value">${stu}</div><div class="stat-sub">active users</div></div>
    <div class="stat-card c-neutral"><div class="stat-label">Avg Mark</div><div class="stat-value ${mc}">${aM!=null?pct(aM):'—'}</div><div class="stat-sub">of available marks</div></div>
    <div class="stat-card c-neutral"><div class="stat-label">CUBE Score</div><div class="stat-value ${aC>=0.6?'good':'warn'}">${pct(aC)}</div><div class="stat-sub">question deconstruction</div></div>
    <div class="stat-card c-neutral"><div class="stat-label">Writing Score</div><div class="stat-value ${aW>=0.8?'good':'warn'}">${pct(aW)}</div><div class="stat-sub">literacy framework</div></div>
  `;
}

function renderRow1(rows,cfg) {
  // ── a. Avg mark by directive ──────────────────────────────────────────────
  const byDir=groupBy(rows.filter(r=>r['Mark %']!=null),r=>r.Directive||'Unknown');
  const dirs=Object.entries(byDir).map(([d,rs])=>({label:d,val:avg(rs.map(r=>r['Mark %'])),count:rs.length})).sort((a,b)=>b.val-a.val).slice(0,8);

  // ── b. CUBE: % submissions where CUBE was attempted (CUBE XP > 0) ────────
  const cubeRows=rows.filter(r=>r['CUBE XP']!=null);
  const cubeAttempted=cubeRows.filter(r=>r['CUBE XP']>0).length;
  const cubePctAttempt=cubeRows.length>0?cubeAttempted/cubeRows.length:0;
  const cA=avg(rows.filter(r=>r['CUBE %']!=null).map(r=>r['CUBE %']));  // avg accuracy

  // ── c. Annotations ────────────────────────────────────────────────────────
  const aR=rows.filter(r=>r['Anno Ideas']!=null&&r['Anno Used']!=null);
  const tI=aR.reduce((s,r)=>s+(r['Anno Ideas']||0),0);
  const tU=aR.reduce((s,r)=>s+(r['Anno Used']||0),0);
  const ar=tI>0?tU/tI:0;

  // ── d. Writing component scores — normalised using per-row max ────────────
  // For each component, compute score/max per row (only rows that have both).
  // Falls back gracefully for legacy rows without max columns (uses /5 then).
  function compPct(rows, scoreCol, maxCol) {
    const valid = rows.filter(r => r[scoreCol] != null && !isNaN(r[scoreCol]));
    if (!valid.length) return null;
    return avg(valid.map(r => {
      const mx = (r[maxCol] != null && !isNaN(r[maxCol]) && r[maxCol] > 0) ? r[maxCol] : 5;
      return Math.min(r[scoreCol], mx) / mx;
    }));
  }
  const wA=avg(rows.filter(r=>r['Write %']!=null).map(r=>r['Write %']));

  const wi=[
    ['Causal Connectives', compPct(rows,'W-Con','W-Con Max'), '#4fc3f7'],
    ['Complex Noun Groups', compPct(rows,'W-Noun','W-Noun Max'), '#a78bfa'],
    ['Modality',            compPct(rows,'W-Mod','W-Mod Max'), '#e8a030'],
    ['Logical Flow & Structure', compPct(rows,'W-Flow','W-Flow Max'), '#43d9ad'],
  ].filter(([,v])=>v!=null&&!isNaN(v));

  document.getElementById('row1').innerHTML=`
    <div class="panel">
      <div class="panel-title">Avg Mark % by HSC Directive <span>${dirs.length} directives</span></div>
      <div class="bar-chart">${dirs.map(d=>`
        <div class="bar-row">
          <div class="bar-label" title="${d.label}">${d.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.val*100}%;background:${cfg.color}"></div></div>
          <div class="bar-val">${pct(d.val)}</div>
        </div>`).join('')}</div>
    </div>
    <div class="panel">
      <div class="panel-title">Question Deconstruction with CUBE</div>
      <div style="margin-bottom:0.75rem">
        <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.1em;font-family:'IBM Plex Mono',monospace">CUBE attempted</div>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.35rem">
          <div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.6rem;font-weight:800;color:#4fc3f7">${Math.round(cubePctAttempt*100)}%</div>
          <div style="font-size:0.75rem;color:var(--text-dim);line-height:1.4">of submissions<br>had CUBE markings</div>
        </div>
        <div class="bar-track" style="height:6px;margin-bottom:0.75rem"><div class="bar-fill" style="width:${cubePctAttempt*100}%;background:#4fc3f7"></div></div>
      </div>
      <div class="panel-title" style="font-size:0.72rem;margin-bottom:0.75rem">CUBE accuracy (avg %)</div>
      <div class="bar-chart" style="margin-bottom:1.25rem">
        <div class="bar-row">
          <div class="bar-label">Qu deconstruction with CUBE</div>
          <div class="bar-track"><div class="bar-fill" style="width:${cA*100}%;background:#4fc3f7"></div></div>
          <div class="bar-val">${pct(cA)}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Literacy tools (avg)</div>
          <div class="bar-track"><div class="bar-fill" style="width:${wA*100}%;background:#43d9ad"></div></div>
          <div class="bar-val">${pct(wA)}</div>
        </div>
      </div>
      <div class="panel-title" style="font-size:0.72rem;margin-bottom:0.75rem">Question annotations</div>
      ${aR.length===0?'<div class="no-data" style="padding:0.75rem 0">No annotation data available</div>':`
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.75rem">
          <div style="text-align:center">
            <div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.5rem;font-weight:800">${tI}</div>
            <div style="font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em">annotated</div>
          </div>
          <div style="color:var(--text-dim);font-size:1rem">→</div>
          <div style="text-align:center">
            <div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:1.5rem;font-weight:800;color:#c9a84c">${tU}</div>
            <div style="font-size:0.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em">used in response</div>
          </div>
          <div style="flex:1">
            <div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${ar*100}%;background:${cfg.color}"></div></div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--text-dim);margin-top:0.3rem">${pct(ar)} utilisation</div>
          </div>
        </div>
      `}
      <div class="panel-title" style="font-size:0.72rem;margin-bottom:0.75rem">Writing component scores (% of max)</div>
      <div class="bar-chart">${wi.map(([label,val,color])=>`
        <div class="bar-row">
          <div class="bar-label">${label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${val*100}%;background:${color}"></div></div>
          <div class="bar-val">${pct(val)}</div>
        </div>`).join('')}</div>
    </div>`;
}

function renderRow2(rows,cfg) {
  const mc={};
  rows.forEach(r=>{const m=normM(r['Mission Category']);mc[m]=(mc[m]||0)+1;});
  // Core agreed literacy tools only — no CLIMBS, no letter prefixes
  const FOCUS_ORDER=[
    'Causal Connectives',
    'Complex Noun Groups',
    'Modality',
    'Logical Flow & Structure',
    'Legibility of handwritten response',
  ];
  const me=FOCUS_ORDER.filter(k=>mc[k]>0).map(k=>[k,mc[k]]);
  const maxM=me.length>0?Math.max(...me.map(e=>e[1])):1;
  document.getElementById('row2').innerHTML=`
    <div class="panel" style="grid-column:1/-1">
      <div class="panel-title">Literacy Focus Areas <span>higher = more students identified here as priority for improvement</span></div>
      ${me.length===0?'<div class="no-data">No literacy focus data available yet</div>':`
      <div class="mission-freq">${me.map(([name,count])=>`
        <div class="mission-row">
          <div class="mission-name">${name}</div>
          <div class="mission-bar-track" style="flex:1;width:auto"><div class="mission-bar-fill" style="width:${(count/maxM)*100}%;background:${MCOL[name]||'#6b7599'}"></div></div>
          <div class="mission-count">${count}</div>
        </div>`).join('')}
      </div>`}
    </div>`;
}

function renderRow3(rows,cfg) {
  const ex=rows.filter(r=>r['Student Phrase']&&r['Improved Version']&&!String(r['Student Phrase']).includes('illegible')&&r['Mission Category']).slice(0,6);
  if(!ex.length){document.getElementById('row3').innerHTML='';return;}
  const mCls=m=>{const n=(m||'').toLowerCase();if(n.includes('causal'))return'fix-causal';if(n.includes('noun'))return'fix-noun';if(n.includes('flow'))return'fix-flow';if(n.includes('modal'))return'fix-mod';return'fix-other';};
  document.getElementById('row3').innerHTML=`
    <div class="panel">
      <div class="panel-title">Student Writing Improvements <span>AI-generated rewrites via CUBE framework</span></div>
      <div class="example-grid">${ex.map(r=>`
        <div class="example-card ${mCls(r['Mission Category'])}">
          <div class="ex-label">${normM(r['Mission Category'])} · ${r['Directive']||''}</div>
          <div class="ex-before">${r['Student Phrase']}</div>
          <div class="ex-after">${r['Improved Version']}</div>
          <div class="ex-kw">${r['Syllabus Kw']||''}</div>
        </div>`).join('')}</div>
    </div>`;
}

function renderRow4(rows,cfg) {
  const tr=rows.filter(r=>r['Mark %']!=null).sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp)).slice(0,25);
  const pill=p=>p>=0.85?'<span class="pill high">High</span>':p>=0.6?'<span class="pill mid">Mid</span>':'<span class="pill low">Low</span>';
  document.getElementById('row4').innerHTML=`
    <div class="panel">
      <div class="panel-title">Submission Log <span>Most recent ${tr.length} entries</span></div>
      <div style="overflow-x:auto"><table class="student-table">
        <thead><tr><th>Student</th><th>Q No</th><th>Directive</th><th>Syllabus Keywords</th><th>Mark</th><th>Mark %</th><th>CUBE %</th><th>Write %</th><th>Literacy Focus</th><th>Band</th></tr></thead>
        <tbody>${tr.map(r=>`
          <tr>
            <td style="font-weight:600">${r.Student}</td>
            <td style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem">${r['Q No']||'—'}</td>
            <td>${r.Directive||'—'}</td>
            <td style="font-size:0.7rem;color:#e8eaf0;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r['Syllabus Kw']||''}">${r['Syllabus Kw']||'—'}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${r['Awd Mark']!=null?r['Awd Mark']:'—'}/${r['Q Marks']||'—'}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${pct(r['Mark %'])}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${r['CUBE %']!=null?pct(r['CUBE %']):'—'}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${r['Write %']!=null?pct(r['Write %']):'—'}</td>
            <td style="font-size:0.72rem;color:#e8eaf0">${normM(r['Mission Category'])}</td>
            <td>${pill(r['Mark %'])}</td>
          </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function pct(v){return Math.round((v||0)*100)+'%';}
function groupBy(a,fn){return a.reduce((acc,i)=>{const k=fn(i);if(!acc[k])acc[k]=[];acc[k].push(i);return acc;},{});}
function normM(m){
  if(!m)return'Other';
  const map={
    // Raw AI outputs → clean display labels
    'complex noun groups':'Complex Noun Groups','complexnoungroups':'Complex Noun Groups',
    'c — complex noun groups':'Complex Noun Groups',
    'logicalflow':'Logical Flow & Structure','logical flow':'Logical Flow & Structure',
    'l — logical flow & structure':'Logical Flow & Structure','structure':'Logical Flow & Structure',
    'modality':'Modality',
    'm — modality':'Modality',
    'causalconnectives':'Causal Connectives','causal connectives':'Causal Connectives',
    'b — because/but/so (causal connectives)':'Causal Connectives',
    'handwriting clarity':'Legibility of handwritten response',
    'legibility and precision':'Legibility of handwritten response',
    'legibility':'Legibility of handwritten response',
    'technical communication':'Technical Vocabulary','technical accuracy':'Technical Vocabulary',
    'technical detail':'Technical Vocabulary','technical precision':'Technical Vocabulary',
    'content depth':'Content Depth','content completeness':'Content Completeness','clarity':'Clarity',
  };
  return map[m.toLowerCase()]||m;
}

showScreen('loading');
loadSheets();
</script>
